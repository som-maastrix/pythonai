<!DOCTYPE html>
<html>

<head>

<title>DevEx WhatsApp Helpdesk</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
display:flex;
height:100vh;
background:#f0f2f5;
}

/* HEADER */

#header{
position:fixed;
top:0;
left:0;
right:0;
height:50px;
background:#075e54;
color:white;
display:flex;
align-items:center;
padding-left:20px;
font-weight:bold;
z-index:1000;
}

#container{
display:flex;
width:100%;
margin-top:50px;
}


/* LEFT PANEL */

#chatList{
width:25%;
background:#ffffff;
border-right:1px solid #ddd;
overflow:auto;
}

.chatItem{
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
font-size:14px;
}

.chatItem:hover{
background:#f2f2f2;
}


/* CENTER CHAT */

#chatBox{
width:50%;
display:flex;
flex-direction:column;
background:#efeae2;
}

#messages{
flex:1;
padding:20px;
overflow:auto;
}

.message{
padding:10px 14px;
margin:8px;
border-radius:10px;
max-width:65%;
font-size:14px;
line-height:1.4;
}

.user{
background:#dcf8c6;
margin-left:auto;
}

.bot{
background:white;
border:1px solid #ddd;
}


/* SEND AREA */

#sendArea{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

#msgInput{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

#sendBtn{
margin-left:10px;
padding:10px 18px;
background:#128c7e;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#sendBtn:hover{
background:#0f7568;
}


/* RIGHT PANEL */

#ticketPanel{
width:25%;
border-left:1px solid #ddd;
padding:20px;
background:#ffffff;
}

.ticketBox{
background:#fafafa;
padding:15px;
border:1px solid #ddd;
border-radius:6px;
}

.ticketBox p{
margin:8px 0;
font-size:14px;
}

#createTicketBtn{
margin-top:10px;
padding:10px;
background:#075e54;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
}

#createTicketBtn:hover{
background:#06463f;
}

</style>

</head>

<body>


<!-- HEADER -->

<div id="header">

DevEx Chat

</div>


<div id="container">


<!-- LEFT PANEL -->
<div id="chatList"></div>


<!-- CHAT BOX -->

<div id="chatBox">

<div id="messages"></div>

<div id="sendArea">

<input id="msgInput" placeholder="Type message...">

<button id="sendBtn" onclick="sendMsg()">Send</button>

</div>

</div>


<!-- USER DETAILS PANEL -->

<div id="ticketPanel">

<h3>User Details</h3>

<div class="ticketBox">

<p><b>Phone:</b> <span id="userPhone">-</span></p>

<p><b>Status:</b> <span id="ticketStatus">Open</span></p>

<p><b>Issue:</b> <span id="ticketIssue">-</span></p>

<p><b>Flat:</b> <span id="ticketFlat">-</span></p>

<button id="createTicketBtn" onclick="createTicket()">

Create Ticket

</button>

</div>

</div>


</div>


<script src="/static/js/engine/chat.js"></script>

</body>

</html>
