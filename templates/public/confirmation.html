<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issue Logged — DevEx FM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:  #1a2b47; --accent: #e07b2a; --green: #25d366;
    --bg:    #f4f6f9; --card:   #ffffff; --border: #dde3ec;
    --text:  #1a2b47; --muted:  #64748b;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh;
         display: flex; flex-direction: column; }
  .lp-header { background: var(--navy); color: #fff; padding: 0 24px;
               display: flex; align-items: center; height: 60px; }
  .logo { font-weight: 700; font-size: 17px; }
  .logo span { color: var(--accent); }
  .main { flex: 1; display: flex; align-items: center; justify-content: center;
          padding: 40px 20px; }
  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: 12px; padding: 48px 40px; max-width: 520px; width: 100%;
          box-shadow: 0 4px 24px rgba(0,0,0,.07); text-align: center; }
  .tick { width: 64px; height: 64px; background: #ecfdf5; border-radius: 50%;
          display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
  .tick svg { width: 32px; height: 32px; stroke: #059669; }
  h1 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
  .sub { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
  .ref-box { background: #f8fafc; border: 1px solid var(--border);
             border-radius: 8px; padding: 16px 20px; margin-bottom: 28px; }
  .ref-label { font-size: 12px; font-weight: 600; color: var(--muted);
               text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .ref-val { font-family: monospace; font-size: 22px; font-weight: 700;
             color: var(--navy); letter-spacing: .05em; }
  .actions { display: flex; flex-direction: column; gap: 12px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
         padding: 13px 24px; border-radius: 8px; font-size: 15px; font-weight: 600;
         text-decoration: none; cursor: pointer; border: none; transition: opacity .15s; }
  .btn:hover { opacity: .88; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-wa      { background: var(--green);  color: #fff; }
  .btn-ghost   { background: transparent; color: var(--muted);
                 border: 1px solid var(--border); }
  .footer { text-align: center; padding: 24px; color: var(--muted); font-size: 13px;
            border-top: 1px solid var(--border); }
</style>
</head>
<body>

<header class="lp-header">
  <div class="logo">DevEx <span>FM</span></div>
</header>

<main class="main">
  <div class="card">
    <div class="tick">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 13.5 4 8.5"/>
      </svg>
    </div>

    <h1>Issue Reported</h1>
    <p class="sub">
      Thank you{% if name %}, {{ name }}{% endif %}. Your issue has been logged and our team will be in touch shortly.
    </p>

    <div class="ref-box">
      <div class="ref-label">Your Reference Number</div>
      <div class="ref-val">{{ ref }}</div>
    </div>

    <div class="actions">
      {% if wa_link %}
      <a href="{{ wa_link }}" target="_blank" class="btn btn-wa">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        Also Send on WhatsApp
      </a>
      {% endif %}
      <a href="/" class="btn btn-ghost">Report Another Issue</a>
    </div>
  </div>
</main>

<footer class="footer">DevEx Studios FM Platform</footer>

</body>
</html>
